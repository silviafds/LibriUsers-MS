spring:
  application:
    name: user-service

  config:
    activate:
      on-profile: default

  main:
    web-application-type: servlet

  datasource:
    url: jdbc:postgresql://localhost:5437/libri-users
    username: user
    password: "123"
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8082
  servlet:
    context-path: /

api:
  security:
    token:
      secret: ${JWT_SECRET:my-very-strong-secret-key-of-32-characters}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    # ⬇️ ESTA É A CONFIGURAÇÃO CRUCIAL ⬇️
    hostname: localhost                    # Força localhost
    prefer-ip-address: false               # ⬅️ FALSE para usar hostname
    ip-address: 127.0.0.1                  # Define IP explícito
    non-secure-port-enabled: true
    secure-port-enabled: false
    instance-id: ${spring.application.name}:${server.port}

    # Metadata adicional
    metadata-map:
      instanceId: ${spring.application.name}:${server.port}
      hostname: localhost
      ip: 127.0.0.1