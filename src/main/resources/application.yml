spring:
  application:
    name: Libri Users Micro Service

  config:
    activate:
      on-profile: default

  main:
    web-application-type: servlet

  datasource:
    url: jdbc:postgresql://localhost:5437/libri-users
    username: user
    password: "123"
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8082
  servlet:
    context-path: /

api:
  security:
    token:
      secret: ${JWT_SECRET:my-very-strong-secret-key-of-32-characters}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/